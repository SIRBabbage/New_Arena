# OpenPI-FAST Evaluation Configuration
# Default path is one-line websocket evaluation with auto-started policy server.

#################################################################################################################
# Inference parameters
#################################################################################################################
inference_mode: "websocket"  # websocket only
train_config_name: "pi0_fast_vla_arena"  # Preferred policy config selector. Change this first when switching OpenPI variants.
policy_checkpoint_dir: "/data/wangshuo/vla-models/pi0-fast-vla-arena-fintuned"  # Full finetuned checkpoint; tends to OOM on 24GB GPUs during eval.
# train_config_name: "pi0_fast_vla_arena_low_mem_finetune"  # Low-memory LoRA variant for 24GB-class GPUs.
# policy_checkpoint_dir: "/data/wangshuo/vla-models/pi0-fast-vla-arena-fintuned-LoRA"  # Local LoRA checkpoint mirror on /data to avoid HF cache pressure on the root partition.
policy_checkpoint_step: "latest"  # "latest" or step number when policy_checkpoint_dir points to an experiment root
auto_start_policy_server: true  # Auto-start serve_policy.py when websocket port is unavailable on local host
policy_server_start_timeout_sec: 180  # Max seconds to wait for auto-started policy server readiness
policy_server_poll_interval_sec: 1.0  # Poll interval (seconds) while waiting for policy server

#################################################################################################################
# Websocket policy server parameters (used when inference_mode="websocket")
#################################################################################################################
host: "0.0.0.0"                    # Model server host address
port: 8000                         # Model server port
resize_size: 224                   # Image resize size for model input
replan_steps: 5                    # Number of actions to execute before replanning

#################################################################################################################
# VLA-Arena environment-specific parameters
#################################################################################################################
task_suite_name: "safety_static_obstacles+unseen"  # Task suite name (e.g., "safety_static_obstacles", "safety_dynamic_obstacles", "long_horizon")
task_level: 1                      # Task level (0, 1, or 2)
task_name: "pick_the_apple_and_place_it_on_the_bowl_1"  # Optional single task selector within the suite/level; accepts task id or exact task text
task_names: null                   # Optional list of task selectors within the suite/level
num_steps_wait: 10                 # Number of steps to wait for objects to stabilize in sim
num_trials_per_task: 30            # Number of rollouts per task
add_noise: false                   # Add noise to observations
adjust_light: false                # Adjust lighting conditions
randomize_color: false             # Randomize object colors
camera_offset: false               # Apply camera offset
blur: false                        # Apply Gaussian blur to observations
safety: false                      # Enable safety mode
layout_perturbation: false         # Rank alternate init states by distance from the default layout
layout_random: false               # Randomly resample tabletop object layouts over a widened workspace
unseen_object_perturbation: false  # Swap the primary task object with an unseen category and skip fixed init states
unseen_object_category: null       # Optional explicit replacement category (e.g. "kiwi"); null/"auto" picks deterministically
init_state_selection_mode: "first"  # "first" | "episode_idx"
init_state_offset: 0                 # Deterministic offset added to init index
init_state_offset_random: false      # If true, add random offset in [0, num_initial_states)

#################################################################################################################
# Utils
#################################################################################################################
save_video_mode: "interval"
# save_video_mode: "first_success_failure"  # Video saving mode: "all", "first_success_failure", "interval", "none"
save_video_every_n_episodes: 2        # Save one rollout every N episodes when save_video_mode == "interval"
use_local_log: true
local_log_dir: "./experiments/logs"       # Local directory for eval logs
seed: 7                                   # Random seed (for reproducibility)
result_json_path: default                 # Path to save aggregated JSON results (default -> ./results/openpi_json_<DATE_TIME>.json)

#################################################################################################################
# Language perturbation parameters
#################################################################################################################
replacements_file: "VLA-Arena/language_replacements"  # Path to replacements JSON file
use_replacements: false                   # Enable language perturbation via instruction replacements
replacement_probability: 1.0              # Probability of applying replacement (0.0 to 1.0)
replacement_level: 1                      # Level of instruction replacements (from 1 to 4)
