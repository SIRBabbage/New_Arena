    model_family: "openvla"                    # Model family
    # Set OPENVLA_PRETRAINED_CHECKPOINT env var or modify the value to point to your checkpoint
    pretrained_checkpoint: "VLA-Arena/openvla-7b-finetuned-vla-arena"
    center_crop: true                          # Center crop? (if trained with random crop augmentation)
    unnorm_key: "vla_arena_l0_l"              # Action un-normalization key
    load_in_8bit: false                         # Load with 8-bit quantization
    load_in_4bit: true                         # Load with 4-bit quantization

    task_suite_name: "safety_static_obstacles"  # Task suite name
    task_level: 0
    num_steps_wait: 10                          # Steps to wait for objects to stabilize
    num_trials_per_task: 10                     # Rollouts per task
    initial_states_path: "DEFAULT"             # "DEFAULT" or path to an initial states JSON
    env_img_res: 256                            # Resolution for rendered environment images
    add_noise: false
    adjust_light: false
    randomize_color: false
    camera_offset: false
    safety: false
    init_state_selection_mode: "first"      # "first" | "episode_idx"
    init_state_offset: 0                     # Deterministic offset added to init index
    init_state_offset_random: false          # If true, add random offset in [0, num_initial_states)

    run_id_note: null                           # Extra note appended to the run ID
    local_log_dir: "./experiments/logs"       # Local directory for evaluation logs
    use_local_log: true
    use_wandb: false                            # Whether to log results to Weights & Biases
    wandb_entity: "your-wandb-entity"
    wandb_project: "your-wandb-project"
    seed: 7                                     # Random seed for reproducibility
    result_json_path: default                 # Path to save aggregated JSON results (default -> ./results/openvla_json_<DATE_TIME>.json)
    save_video_mode: "first_success_failure"  # Video saving mode: "all", "first_success_failure", "none"

    replacements_file: "VLA-Arena/language_replacements"  # Path to replacements JSON file
    use_replacements: false                   # Whether to use instruction replacements
    replacement_probability: 1.0              # Probability of applying replacement (0.0 to 1.0)
    replacement_level: 1                      # Level of instruction replacements (from 1 to 4)
